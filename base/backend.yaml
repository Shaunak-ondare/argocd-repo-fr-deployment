apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # The image tag will be automatically updated by the CI/CD pipeline
        image: shaunakondare/todo-backend:dd8fa77e363d1600ca45dc37032a7890f40f6792
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: production
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres:5432/todo_db
        - name: SECRET_KEY
          value: super-secret-todo-key-change-in-production
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: todo-app
spec:
  ports:
  - port: 5000
  selector:
    app: backend
